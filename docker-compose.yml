services:
  # -------------------------------------------------------
  # PostgreSQL database
  # -------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: ballstream_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ballstream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-football_stream}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------
  # Go backend API
  # -------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ballstream_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL to point to the postgres container
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      TRUST_PROXY_HEADERS: "true"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -------------------------------------------------------
  # React/Vite frontend (built and served by nginx)
  # -------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ballstream_frontend
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # -------------------------------------------------------
  # Nginx reverse proxy (public-facing)
  # -------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ballstream_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for TLS:
      # - ./certs:/etc/nginx/certs:ro
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  internal:
    driver: bridge
    # Isolate containers from each other unless explicitly connected
    internal: false
