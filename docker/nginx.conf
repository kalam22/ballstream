# Nginx reverse proxy for ballstream
# Sits in front of backend (Go:8081) and frontend (nginx:80)

worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ---------- Rate limiting zones ----------
    limit_req_zone $binary_remote_addr zone=ballstream_api:10m rate=8r/s;
    limit_req_zone $binary_remote_addr zone=ballstream_html:10m rate=15r/s;
    limit_conn_zone $binary_remote_addr zone=ballstream_conn:10m;

    # ---------- Upstreams ----------
    upstream backend {
        server backend:8081;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Global settings ----------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    server {
        listen 80;
        server_name _;

        # Block internal metrics from public
        location /internal/ {
            deny all;
            return 403;
        }

        # API: proxy to Go backend
        location /api/ {
            limit_req zone=ballstream_api burst=15 nodelay;
            limit_conn ballstream_conn 30;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # Health check: proxy to Go backend
        location /health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log off;
        }

        # Everything else: serve frontend SPA
        location / {
            limit_req zone=ballstream_html burst=30 nodelay;
            limit_conn ballstream_conn 40;

            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
}
